spring.application.name=ormlearn


# Setting up the database connection properties in the application.properties file is crucial for Spring Boot applications that use JPA and Hibernate. The provided configuration specifies the database URL, username, password, and driver class name for connecting to a MySQL database named "ormlearn" running on localhost.
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=@Priyanshu780414
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL
spring.jpa.show-sql=true

# Logging
logging.level.org.springframework=INFO
logging.level.com.cognizant=DEBUG